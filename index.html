<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>张伟 - WEB前端开发简历</title>
  <meta name="description" content="张伟，WEB前端，9年经验，本科，现居青岛。熟悉 Vue2、uniapp、小程序、Node.js、Element UI、Vant、uView 等。">
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f6;
      --paper: #ffffff;
      --ink: #1d2630;
      --muted: #637083;
      --line: #d6dee8;
      --accent: #0b7a75;
      --accent-dark: #075c59;
      --shadow: 0 18px 50px rgba(28, 40, 56, 0.16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.65;
      color: var(--ink);
      background: var(--bg);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid rgba(214, 222, 232, 0.9);
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(14px);
    }

    .topbar-inner {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .identity { min-width: 0; }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--ink);
      background: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      font-family: inherit;
      cursor: pointer;
    }

    .button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .button:hover {
      border-color: var(--accent);
      color: var(--accent-dark);
    }

    .button.primary:hover {
      color: #fff;
      background: var(--accent-dark);
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 28px auto 56px;
    }

    .resume-view {
      display: grid;
      gap: 24px;
      justify-items: center;
    }

    .resume-page {
      width: min(100%, 840px);
      margin: 0;
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .resume-page img {
      display: block;
      width: 100%;
      height: auto;
    }

    @media (max-width: 720px) {
      .topbar-inner {
        width: min(100% - 20px, 1120px);
        align-items: flex-start;
        flex-direction: column;
        padding: 12px 0;
        gap: 10px;
      }

      .actions {
        width: 100%;
        justify-content: flex-start;
      }

      .button {
        min-height: 36px;
        padding: 0 12px;
        font-size: 13px;
      }

      main {
        width: min(100% - 16px, 1120px);
        margin-top: 16px;
      }

      .resume-view { gap: 14px; }
      .resume-page { box-shadow: 0 10px 28px rgba(28, 40, 56, 0.15); }
    }

    @media print {
      body { background: #fff; }
      .topbar { display: none; }
      main { width: 100%; margin: 0; }
      .resume-view { display: block; }
      .resume-page {
        width: 100%;
        border: 0;
        box-shadow: none;
        page-break-after: always;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="identity">
        <h1>张伟 - WEB前端开发简历</h1>
        <p class="subtitle">9年经验 / 本科 / 现居青岛 / 17685472913</p>
      </div>
      <nav class="actions" aria-label="简历操作">
        <a class="button" href="assets/resume.pdf">原 PDF</a>
        <button class="button primary" type="button" onclick="window.print()">打印</button>
      </nav>
    </div>
  </header>
  <main>
    <section class="resume-view" aria-label="简历页面">
        <figure class="resume-page"><img src="assets/page-1.png" alt="张伟前端开发简历第 1 页" loading="eager"></figure>
        <figure class="resume-page"><img src="assets/page-2.png" alt="张伟前端开发简历第 2 页" loading="lazy"></figure>
        <figure class="resume-page"><img src="assets/page-3.png" alt="张伟前端开发简历第 3 页" loading="lazy"></figure>
        <figure class="resume-page"><img src="assets/page-4.png" alt="张伟前端开发简历第 4 页" loading="lazy"></figure>
        <figure class="resume-page"><img src="assets/page-5.png" alt="张伟前端开发简历第 5 页" loading="lazy"></figure>
        <figure class="resume-page"><img src="assets/page-6.png" alt="张伟前端开发简历第 6 页" loading="lazy"></figure>
    </section>
  </main>
</body>
</html>

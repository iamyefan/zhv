<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>张伟 - WEB前端开发简历</title>
  <meta name="description" content="张伟，WEB前端开发，9年经验，本科，现居青岛。熟悉 Vue、uniapp、小程序、React、Node.js、Element UI、Vant、uView 等。">
  <link rel="preload" as="image" href="assets/page-1.png">
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f6f8;
      --paper: #ffffff;
      --ink: #1d2630;
      --muted: #637083;
      --line: #d6dee8;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --glow: rgba(37, 99, 235, 0.22);
      --shadow: 0 16px 42px rgba(29, 38, 48, 0.14);
      --shadow-active: 0 26px 70px rgba(29, 38, 48, 0.2);
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.65;
      color: var(--ink);
      background: var(--bg);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        linear-gradient(115deg, rgba(37, 99, 235, 0.08), transparent 34%),
        linear-gradient(245deg, rgba(14, 165, 233, 0.07), transparent 38%),
        repeating-linear-gradient(90deg, rgba(29, 38, 48, 0.035) 0 1px, transparent 1px 64px);
      animation: stageShift 16s ease-in-out infinite alternate;
    }

    .progress {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 20;
      width: 100%;
      height: 3px;
      transform-origin: left center;
      transform: scaleX(0);
      background: linear-gradient(90deg, #2563eb, #0ea5e9, #6366f1);
      box-shadow: 0 0 18px var(--glow);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid rgba(214, 222, 232, 0.88);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(12px);
      animation: slideDown 520ms ease-out both;
    }

    .topbar-inner {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .identity { min-width: 0; }

    h1 {
      margin: 0;
      font-size: 19px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .button {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--ink);
      background: #fff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      font-family: inherit;
      cursor: pointer;
      overflow: hidden;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease, background 160ms ease, color 160ms ease;
    }

    .button::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-120%) skewX(-18deg);
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
      transition: transform 520ms ease;
    }

    .button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .button:hover {
      border-color: var(--accent);
      color: var(--accent-dark);
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(29, 38, 48, 0.12);
    }

    .button:hover::after {
      transform: translateX(120%) skewX(-18deg);
    }

    .button.primary:hover {
      color: #fff;
      background: var(--accent-dark);
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 24px auto 52px;
    }

    .resume-view {
      display: grid;
      gap: 22px;
      justify-items: center;
    }

    .resume-page {
      position: relative;
      width: min(100%, 840px);
      margin: 0;
      background: var(--paper);
      border: 1px solid rgba(214, 222, 232, 0.92);
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(28px) scale(0.985);
      transition: opacity 620ms ease, transform 620ms ease, box-shadow 220ms ease;
      will-change: transform, opacity;
    }

    .resume-page::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0;
      background: linear-gradient(115deg, transparent 8%, rgba(255, 255, 255, 0.42) 42%, transparent 58%);
      transform: translateX(-120%);
      transition: opacity 220ms ease, transform 900ms ease;
    }

    .resume-page.is-active {
      box-shadow: var(--shadow-active);
    }

    .resume-page.is-visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .resume-page:hover {
      transform: translateY(-3px) scale(1.002);
      box-shadow: 0 22px 58px rgba(29, 38, 48, 0.18);
    }

    .resume-page:hover::before {
      opacity: 1;
      transform: translateX(120%);
    }

    .resume-page img {
      display: block;
      width: 100%;
      height: auto;
    }

    .page-rail {
      position: fixed;
      right: 28px;
      top: 50%;
      z-index: 11;
      display: grid;
      gap: 10px;
      padding: 10px 8px;
      border: 1px solid rgba(214, 222, 232, 0.82);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 14px 34px rgba(29, 38, 48, 0.12);
      backdrop-filter: blur(12px);
      transform: translateY(-50%);
    }

    .page-dot {
      width: 8px;
      height: 8px;
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: #a8b3c2;
      cursor: pointer;
      transition: height 180ms ease, background 180ms ease, transform 180ms ease;
    }

    .page-dot:hover,
    .page-dot.is-active {
      height: 22px;
      background: var(--accent);
      transform: scale(1.05);
    }

    .back-top {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 12;
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 999px;
      color: #fff;
      background: var(--accent);
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.26);
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px) scale(0.94);
      transition: opacity 180ms ease, transform 180ms ease, background 160ms ease;
    }

    .back-top.is-visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0) scale(1);
    }

    .back-top:hover {
      background: var(--accent-dark);
      transform: translateY(-2px) scale(1.03);
    }

    .back-top::before {
      content: "";
      display: block;
      width: 11px;
      height: 11px;
      margin: 17px auto 0;
      border-top: 2px solid currentColor;
      border-left: 2px solid currentColor;
      transform: rotate(45deg);
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes stageShift {
      from { background-position: 0 0, 0 0, 0 0; }
      to { background-position: 80px 0, -60px 40px, 64px 0; }
    }

    @media (max-width: 720px) {
      .topbar-inner {
        width: min(100% - 20px, 1120px);
        align-items: flex-start;
        flex-direction: column;
        padding: 12px 0;
        gap: 10px;
      }

      .actions {
        width: 100%;
        justify-content: flex-start;
      }

      .button {
        min-height: 34px;
        padding: 0 12px;
        font-size: 13px;
      }

      main { width: 100%; margin-top: 0; }

      .resume-view { gap: 10px; }
      .resume-page {
        width: 100%;
        border-right: 0;
        border-left: 0;
        box-shadow: none;
      }

      .resume-page:hover {
        transform: translateY(0) scale(1);
        box-shadow: none;
      }

      .resume-page.is-active {
        box-shadow: none;
      }

      .resume-page::before,
      .page-rail {
        display: none;
      }

      .back-top {
        right: 14px;
        bottom: 14px;
      }
    }

    @media print {
      body { background: #fff; }
      body::before, .progress, .topbar, .back-top, .page-rail { display: none; }
      main { width: 100%; margin: 0; }
      .resume-view { display: block; }
      .resume-page {
        opacity: 1;
        transform: none;
        width: 100%;
        border: 0;
        box-shadow: none;
        page-break-after: always;
        break-after: page;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      body::before, .topbar { animation: none; }
      .resume-page, .button, .back-top {
        transition: none;
      }
      .resume-page {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div class="progress" aria-hidden="true"></div>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="identity">
        <h1>张伟 - WEB前端开发简历</h1>
        <p class="subtitle">9年经验 / 本科 / 现居青岛 / WEB前端开发</p>
      </div>
      <nav class="actions" aria-label="简历操作">
        <a class="button" href="assets/resume.pdf" download>下载 PDF</a>
        <button class="button primary" type="button" onclick="window.print()">打印</button>
      </nav>
    </div>
  </header>
  <main>
    <section class="resume-view" aria-label="简历页面">
        <figure class="resume-page"><img src="assets/page-1.png" width="1488" height="2105" alt="张伟前端开发简历第 1 页" loading="eager" decoding="async" fetchpriority="high"></figure>
        <figure class="resume-page"><img src="assets/page-2.png" width="1488" height="2105" alt="张伟前端开发简历第 2 页" loading="lazy" decoding="async"></figure>
        <figure class="resume-page"><img src="assets/page-3.png" width="1488" height="2105" alt="张伟前端开发简历第 3 页" loading="lazy" decoding="async"></figure>
        <figure class="resume-page"><img src="assets/page-4.png" width="1488" height="2105" alt="张伟前端开发简历第 4 页" loading="lazy" decoding="async"></figure>
        <figure class="resume-page"><img src="assets/page-5.png" width="1488" height="2105" alt="张伟前端开发简历第 5 页" loading="lazy" decoding="async"></figure>
        <figure class="resume-page"><img src="assets/page-6.png" width="1488" height="2105" alt="张伟前端开发简历第 6 页" loading="lazy" decoding="async"></figure>
    </section>
  </main>
  <button class="back-top" type="button" aria-label="返回顶部"></button>
  <nav class="page-rail" aria-label="简历页码导航">
    <button class="page-dot" type="button" aria-label="第 1 页" data-page="0"></button>
    <button class="page-dot" type="button" aria-label="第 2 页" data-page="1"></button>
    <button class="page-dot" type="button" aria-label="第 3 页" data-page="2"></button>
    <button class="page-dot" type="button" aria-label="第 4 页" data-page="3"></button>
    <button class="page-dot" type="button" aria-label="第 5 页" data-page="4"></button>
    <button class="page-dot" type="button" aria-label="第 6 页" data-page="5"></button>
  </nav>
  <script>
    const progress = document.querySelector('.progress');
    const backTop = document.querySelector('.back-top');
    const pages = document.querySelectorAll('.resume-page');
    const dots = document.querySelectorAll('.page-dot');

    const updateScrollState = () => {
      const max = document.documentElement.scrollHeight - window.innerHeight;
      const ratio = max > 0 ? window.scrollY / max : 0;
      progress.style.transform = `scaleX(${Math.min(1, Math.max(0, ratio))})`;
      backTop.classList.toggle('is-visible', window.scrollY > 500);

      let activeIndex = 0;
      let nearestDistance = Number.POSITIVE_INFINITY;

      pages.forEach((page, index) => {
        const rect = page.getBoundingClientRect();
        const distance = Math.abs(rect.top - window.innerHeight * 0.18);
        if (distance < nearestDistance) {
          nearestDistance = distance;
          activeIndex = index;
        }
      });

      pages.forEach((page, index) => page.classList.toggle('is-active', index === activeIndex));
      dots.forEach((dot, index) => dot.classList.toggle('is-active', index === activeIndex));
    };

    if ('IntersectionObserver' in window) {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            observer.unobserve(entry.target);
          }
        });
      }, { rootMargin: '0px 0px -12% 0px', threshold: 0.08 });

      pages.forEach((page) => observer.observe(page));
    } else {
      pages.forEach((page) => page.classList.add('is-visible'));
    }

    dots.forEach((dot) => {
      dot.addEventListener('click', () => {
        const page = pages[Number(dot.dataset.page)];
        if (page) {
          page.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
    });

    backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    window.addEventListener('scroll', updateScrollState, { passive: true });
    window.addEventListener('resize', updateScrollState);
    updateScrollState();
  </script>
</body>
</html>
